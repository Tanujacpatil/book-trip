<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>book your trip</title>  
</head>  
<body bgcolor="purple">  
    <h1 style="text-align: center;">  
        <u>BOOK YOUR TRIP</u>  
    </h1>  
  
<form action="">  
    <fieldset>  
        <table cellpadding="8">  
            <tr>  
                <td><label for=""><B>NAME</B></label></td>  
                <td><input type="text" name="" id="" placeholder="Enter your 
full  
name(surname-your name-father name)" required></td>  
  
            </tr>  
  
            <tr>  
                <td><label for=""><B>EMAIL ID</B></label></td>  
                <td><input type="email" placeholder="abcxxx@gmail.com"  
required></td>  
            </tr>  
  
            <tr>  
                <td><label for=""><B>PASSWORD</B></label></td>  
                <td><input type="password" name="" id="" required min="8"  
max="12"></td>  
            </tr>  
  
            <tr>  
                <td><label for=""><B>MOBILE NO.</B></label></td>  
                <td><input type="tel" maxlength="13" placeholder="Enter with  
country code" required></td>  
            </tr>  
  
            <tr>  
                <td><B>NUMBER OF TRAVELLERS</B></td>  
                <td><input type="number" min="1" max="10" value="1"></td>  
            </tr>  
  
            <tr>  
                <td><label for=""><B>DATE</B></label></td>  
                <td><input type="date" ></td>  
            </tr>  
            <tr>  
                <td><label for="destination"><B>CHOOSE YOUR  
DESTINATION</B></label></td>  
                <td><select name="destination">  
                    <option value="KOLHAPUR">KOLHAPUR</option>  
                    <option value="PUNE">PUNE</option>  
                    <option value="MUMBAI">MUMBAI</option> 
                     <option value="mizoram">mizoram</option>  
                    <option 
value="jammu_and_kashmir">jammu_and_kashmir</option>  
                    <option value="keral">keral</option>  
                </select></td>  
            </tr>  
  
            <tr>  
                <td>  
                    <label for="gender"><B>SELECT GENDER</B></label></td>  
                    <td>  
                        <label for="male">MALE</label>  
                        <input type="radio" value="MALE" name="gender">  
                    </td>  
                    <td>  
                        <label for="female">FEMALE</label>  
                        <input type="radio" value="FEMALE" name="gender">  
                    </td>  
                    <td>  
                        <label for="other">other</label>  
                        <input type="radio" value="other" name="gender">  
                    </td>  
                  
            </tr>  
  
            <tr>  
                <td><label for="travel type"><B>TYPE OF 
TRAVEL</B></label></td>  
                <td>  
                    <label for="adventure">ADVENTURE</label>  
                    <input type="checkbox" value="adventure">  
                    <label for="adventure">HISTORICAL</label>  
                    <input type="checkbox" value="historical"> 
                    <label for="wild experiences">wild experiencesL</label>  
                    <input type="checkbox" value="wild experiences">   
                </td>  
            </tr>  
  
            <tr>  
                <td>  
                    <label for=""><B>UPLOAD ID PROOF</B></label>  
                </td>  
                <td><input type="file"></td>  
            </tr>  
  
            <tr>  
                <td>  
                    <label for="comments"><B>ADDITIONAL COMMENTS</B></label>  
                </td>  
                <td>  
                    <textarea name="comments" placeholder="ANY OTHER  
REQUEST/suggetion??"></textarea>  
                </td>  
  
            </tr>  
  
        </table>  
    </fieldset>  
</form>  
  
<br>  
<center>  
<input type="submit" value="SUBMIT" style="background-color:cornflowerblue;">  
<input type="reset" value="RESET" style="background-color:cornflowerblue;">  
</center>  
  
<marquee behavior="" direction="">THANK YOU FOR VISITING</marquee>  
</body>  
</html>
